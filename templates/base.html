<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Numerical Project{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>

    <!-- Saves the currnet theme so that it doesn't go back to darkmode if it was set to lightmode then refreshed-->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>

    <header class="calc-header">
        <h1>Fixed Point Iterations Calculator</h1>
        <button id="theme-toggle" class="theme-btn">
            <img src="{{ url_for('static', filename='images/lightmode.png') }}" id="theme-icon" alt="Toggle Theme">
        </button>   
    </header>
</head>
<body>
    {%block content%} {% endblock %}
</body>
</html>
