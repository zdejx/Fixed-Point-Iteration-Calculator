{% extends "base.html" %}

{% block content %}

<div class="calc-container">

    

    <div class="tab-nav">
        <a href="{{ url_for('FixedPointIteration_page') }}" class="tab active">FPI</a>
        <a href="{{ url_for('Interval_page') }}" class="tab inactive ">Interval</a>
    </div>

    <header class="calc-header">
        <h1>Fixed Point Iteration Calculator</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="{{ url_for('index') }}" class="theme-btn">
                <img src="{{ url_for('static', filename='images/home_button_light.svg') }}" id="home-icon" alt="Home">
            </a>
            <button id="theme-toggle" class="theme-btn">
                <img src="{{ url_for('static', filename='images/lightmode.png') }}" id="theme-icon" alt="Toggle Theme">
            </button>
        </div>
    </header>

    <div class="main-card">
        <div class="panel input-side">
            <form action="{{ url_for('FixedPointIteration_page') }}" method="POST">

                <!---input fields, left side--->
                <div class="top-inputs">
                    <div class="field-group flex-3">
                        <label>g(x):</label>
                        <input type="text" name="equation" id="g_of_x" placeholder="e.g., 2*x**3 - 2*x - 9" required>
                    </div>
                    <div class="field-group">
                        <label>Interval (x0):</label>
                        <input type="text" name="x0" step="any" placeholder="1.5" required>
                    </div>
                    <div class="field-group">
                        <label>Stopping point:</label>
                        <input type="text" name="stopping_point" step="any" placeholder="0.001" required>
                    </div>
                    <div class="field-group">
                        <label>Round off by:</label>
                        <input type="text" name="roundoff" step="any" placeholder="5" required>
                    </div>
                </div>

                <!---keypad buttons, left side--->
                <div class="keypad-container">
                    <div class="keypad-grid">
                        <button type="button" class="key">sin</button>
                        <button type="button" class="key">cos</button>
                        <button type="button" class="key">tan</button>
                        <button type="button" class="key">(</button>
                        <button type="button" class="key">)</button>
                        <button type="button" class="key-alt">⌫</button>

                        <button type="button" class="key">log</button>
                        <button type="button" class="key">ln</button>
                        <button type="button" class="key-num">7</button>
                        <button type="button" class="key-num">8</button>
                        <button type="button" class="key-num">9</button>
                        <button type="button" class="key-alt">AC</button>

                        <button type="button" class="key">π</button>
                        <button type="button" class="button-special">√</button>
                        <button type="button" class="key-num">4</button>
                        <button type="button" class="key-num">5</button>
                        <button type="button" class="key-num">6</button>
                        <button type="button" class="key">×</button>

                        <button type="button" class="key">e</button>
                        <button type="button" class="key">abs</button>
                        <button type="button" class="key-num">1</button>
                        <button type="button" class="key-num">2</button>
                        <button type="button" class="key-num">3</button>
                        <button type="button" class="key">/</button>

                        <button type="button" class="key">shift↑</button>
                        <button type="button" class="key">inv</button>
                        <button type="button" class="key-num">.</button>
                        <button type="button" class="key-num">0</button>
                        <button type="button" class="key-num">,</button>
                        <button type="button" class="key">−</button>

                        <button type="button" class="key">x</button>
                        <button type="button" class="key">y</button>
                        <button type="button" class="key">^</button>
                        <button type="button" class="key">x²</button>
                        <button type="button" class="key">(-)</button>
                        <button type="button" class="key">+</button>
                    </div>
                    <button type="submit" class="calculate-btn">calculate</button>
                </div>
            </form>
        </div>
        
        <!---reopen panel button-->
        {% if result %}
        <div class="panel reopen-panel-wrapper output-side" id="reopen-panel-wrapper" title="Show results" style="display: none;">
            <button type="button" id="reopen-panel-btn" class="key-alt">←</button>
        </div>

        <!--Output right side-->
        <div class="panel output-side" id="result-panel">
            <div class="output-inner-card">
                <button type="button" class="key-alt" id="close-panel-btn" style="width: 40px; float: right; margin-bottom: 10px;">×</button>
                
                <div style="clear: both;"></div>

                <label style="color: #eee; font-size: 0.95rem; margin-bottom: 8px; display: block;"></label>
<textarea class="result-textarea" readonly>g(x) = {{ result.given }}
g'(x) = {{ result.g_prime_x }}
interval = {{ result.x0 }}
|g'({{result.x0}})| = {{ result.abs_gx }}
Status: {{ "CONVERGENT" if result.abs_gx and result.abs_gx < 1 else "DIVERGENT" }}
{% if result.success and result.iterations %}
            --- Iteration Results ---
{% for i in range(result.iterations|length) -%}
{{ i + 1 }}: {{ result.iterations[i] }} || Relative error: {{ result.rel_error_counter[i] }}%
{% endfor %}{%- endif %}
{% if result.error %}
Error Details: {{ result.error }}{% endif %}</textarea>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
